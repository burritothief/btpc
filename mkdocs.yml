site_name: BTPC Documentation
site_description: Development documentation for the BTPC BitTorrent metainfo toolkit
site_author: Jeff
site_url: https://burritothief.github.io/btpc/
repo_name: burritothief/btpc
repo_url: https://github.com/burritothief/btpc
edit_uri: edit/main/docs/
use_directory_urls: true
strict: true
exclude_docs: |
  overrides/

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/index.md
      - Installation: getting-started/installation.md
      - CLI Quick Start: getting-started/cli.md
      - Python Quick Start: getting-started/python.md
      - Rust Quick Start: getting-started/rust.md
  - Guides:
      - Overview: guides/index.md
      - Creating Torrents: guides/creating.md
      - Inspecting and Validating: guides/inspecting-validating.md
      - Verifying Payloads: guides/verifying.md
      - Editing Metainfo: guides/editing.md
      - Configuration and Presets: guides/configuration-presets.md
  - Concepts:
      - Overview: concepts/index.md
      - BitTorrent v1: concepts/v1.md
      - BitTorrent v2: concepts/v2.md
      - Hybrid Torrents: concepts/hybrid.md
      - Piece Length: concepts/piece-length.md
      - Reproducibility and Bytes: concepts/reproducibility-bytes.md
  - CLI:
      - Overview: cli/index.md
      - Configuration: cli/configuration.md
      - Shell Completion: cli/completion.md
  - Python:
      - Overview: python/index.md
      - Examples: python/examples.md
      - API Reference:
          - Creation: python/reference/creation.md
          - Metainfo: python/reference/metainfo.md
          - Verification: python/reference/verification.md
          - Types: python/reference/types.md
          - Errors: python/reference/errors.md
  - Rust:
      - Overview: rust/index.md
  - Performance: performance.md
  - Compatibility: compatibility.md
  - Security: security.md
  - Contributing: contributing.md
theme:
  name: material
  language: en
  custom_dir: docs/overrides
  font: false
  features:
    - navigation.indexes
    - navigation.sections
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - python
          options:
            docstring_style: google
            members_order: source
            show_signature_annotations: true
            signature_crossrefs: true
            annotations_path: brief
            heading_level: 2
            show_source: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

copyright: Copyright &copy; 2026 Jeff. Licensed under MIT.

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/burritothief/btpc
      name: BTPC source repository
    - icon: material/bug
      link: https://github.com/burritothief/btpc/issues
      name: Report a BTPC issue
    - icon: material/license
      link: https://github.com/burritothief/btpc/blob/main/LICENSE
      name: MIT License
