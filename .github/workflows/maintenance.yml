name: Repository maintenance

on:
  schedule:
    - cron: "47 8 * * 4"
  workflow_dispatch:

concurrency:
  group: maintenance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  documentation:
    name: Maintenance / documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LYCHEE_VERSION: "0.24.2"
      LYCHEE_SHA256: 1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.94.1
      - name: Install mdBook
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: mdbook@0.5.3
      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.11"
      - name: Install locked maintenance tools
        run: uv sync --all-groups --locked
      - name: Install Lychee
        shell: bash
        run: |
          archive="lychee-x86_64-unknown-linux-gnu.tar.gz"
          url="https://github.com/lycheeverse/lychee/releases/download/lychee-v${LYCHEE_VERSION}/${archive}"
          curl --proto '=https' --tlsv1.2 --fail --location --retry 3 \
            --output "${RUNNER_TEMP}/${archive}" "$url"
          echo "${LYCHEE_SHA256}  ${RUNNER_TEMP}/${archive}" | sha256sum --check
          mkdir "${RUNNER_TEMP}/lychee"
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}/lychee"
          mkdir "${RUNNER_TEMP}/lychee-bin"
          install "${RUNNER_TEMP}/lychee/lychee-x86_64-unknown-linux-gnu/lychee" \
            "${RUNNER_TEMP}/lychee-bin/lychee"
          echo "${RUNNER_TEMP}/lychee-bin" >> "$GITHUB_PATH"
      - name: Run canonical documentation gate
        run: make docs-check
      - name: Check external links and live documentation
        run: make docs-health
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Publish documentation health summary
        if: always()
        shell: bash
        run: |
          if [[ -f .tmp/docs-link-health.md ]]; then
            cat .tmp/docs-link-health.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if grep -Eq '^\| 🚫 Errors +\| [1-9]' .tmp/docs-link-health.md 2>/dev/null; then
            {
              echo
              echo '<details><summary>External URL source inventory</summary>'
              echo
              cat .tmp/docs-external-links.md
              echo '</details>'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
