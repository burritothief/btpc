name: Coverage

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage / informational
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install Rust 1.94.1 with coverage tools
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.94.1
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-llvm-cov@0.8.7
      - name: Install uv and Python
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.14"
      - name: Install locked Python tools
        run: uv sync --all-groups --locked
      - name: Build development extension
        run: uv run maturin develop
      - name: Generate Rust coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path rust.lcov
      - name: Generate Python coverage
        run: uv run pytest tests/python --cov=btpc --cov-report=term --cov-report=xml:python-coverage.xml
      - name: Write coverage summary
        run: |
          {
            echo '## Informational coverage'
            echo
            echo 'Coverage is reported without a threshold while the pre-1.0 protocol suite matures.'
            echo
            cargo llvm-cov report --summary-only
            echo
            uv run coverage report
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            rust.lcov
            python-coverage.xml
            .coverage
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 5
