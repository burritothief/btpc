name: Coverage

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage / informational
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - name: Install Rust 1.94.1 with coverage tools
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.94.1
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-llvm-cov@0.8.7
      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.14"
      - name: Install locked Python tools
        run: uv sync --all-groups --locked
      - name: Build development extension
        run: uv run maturin develop
      - name: Generate Rust coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path rust.lcov
      - name: Generate Python coverage
        run: uv run pytest tests/python --cov=btpc --cov-report=term --cov-report=xml:python-coverage.xml
      - name: Write coverage summary
        run: |
          {
            echo '## Informational coverage'
            echo
            echo 'Coverage is reported without a threshold while the pre-1.0 protocol suite matures.'
            echo
            cargo llvm-cov report --summary-only
            echo
            uv run coverage report
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            rust.lcov
            python-coverage.xml
            .coverage
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 5
