name: Scheduled fuzzing

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Scheduled fuzz targets
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-fuzz@0.13.2
      - run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu parse fuzz/corpus/parse -- -max_total_time=300
      - run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu canonical_roundtrip fuzz/corpus/canonical_roundtrip -- -max_total_time=300
      - run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu metainfo fuzz/corpus/metainfo -- -max_total_time=300
      - run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu metainfo_roundtrip fuzz/corpus/metainfo_roundtrip -- -max_total_time=300
      - run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu magnet fuzz/corpus/magnet -- -max_total_time=300
