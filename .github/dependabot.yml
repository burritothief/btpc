version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels: [dependencies, rust]
    commit-message:
      prefix: deps(rust)
    groups:
      rust-patch-minor:
        update-types: [minor, patch]
    cooldown:
      default-days: 7

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels: [dependencies, python]
    commit-message:
      prefix: deps(python)
    groups:
      python-patch-minor:
        update-types: [minor, patch]
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
    commit-message:
      prefix: deps(actions)
    groups:
      github-actions:
        patterns: ["*"]
    cooldown:
      default-days: 7
